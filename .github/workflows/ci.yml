name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Unit tests
        run: go test -race -covermode=atomic ./...

      - name: Eval corpus gate
        run: |
          go run ./cmd/agent eval -corpus testdata/eval -min-f1 0.85

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.59
          args: --timeout=5m

      - name: gosec
        uses: securego/gosec@master
        with:
          args: ./...

      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

      - name: SBOM
        run: |
          go install github.com/anchore/syft/cmd/syft@latest
          syft packages dir:. -o cyclonedx-json > sbom.cdx.json

      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.cdx.json

  release-signing:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    needs: lint-and-test
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - run: go build -o ghostcatcher ./cmd/agent
      - uses: sigstore/cosign-installer@v3
      - name: Cosign sign binary
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: cosign sign-blob --yes ghostcatcher --output-signature ghostcatcher.sig
      - uses: actions/upload-artifact@v4
        with:
          name: release
          path: |
            ghostcatcher
            ghostcatcher.sig
