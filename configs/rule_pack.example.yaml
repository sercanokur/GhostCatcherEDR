  - id: CVE_2026_31431_AF_ALG_AEAD
    techniques: ["T1068"]
    tactic: privilege-escalation
    min_signals: 1
    base_score: 90
    per_signal_bonus: 5
    cap_score: 100
    description: >
      AF_ALG SOCK_SEQPACKET socket() created by a process outside the
      known disk-encryption / kTLS allowlist. This is the mandatory
      first syscall of every public CVE-2026-31431 ("Copy Fail") Linux
      LPE exploit; the AEAD interface is then driven via splice() to
      poison the page cache of a SUID binary.

  - id: CVE_2026_31431_PAGE_CACHE_POISONING
    techniques: ["T1068", "T1014"]
    tactic: privilege-escalation
    min_signals: 1
    base_score: 95
    per_signal_bonus: 5
    cap_score: 100
    description: >
      A watched SUID binary (e.g. /usr/bin/su) hashes differently when
      read through the page cache vs. immediately after dropping its
      cached pages. CVE-2026-31431 ("Copy Fail") corrupts cached pages
      of setuid binaries without modifying the file on disk, which is
      exactly the asymmetry this rule reports.
